<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Cuidado de Pets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🐾 Sistema de Cuidado de Pets</h1>

<h2>Cadastrar Pet</h2>
<input id="nome" placeholder="Nome">
<input id="idade" type="number" placeholder="Idade">
<select id="tipo">
  <option value="">Selecione o tipo</option>
  <option value="Gato">Gato</option>
  <option value="Cachorro">Cachorro</option>
  <option value="Hamster">Hamster</option>
  <option value="Coelho">Coelho</option>
  <option value="Peixe">Peixe</option>
</select>
<input type="file" id="foto" accept="image/*">
<button onclick="cadastrarPet()">Cadastrar</button>

<h2>Meus Pets</h2>
<div id="pets"></div>

<h2>Diário do Pet</h2>
<div id="diario"></div>

<h2>Observações do Pet</h2>
<div id="observacoes"></div>

<h2>Cadastrar Veterinário</h2>
<input id="vetNome" placeholder="Nome">
<input id="vetEspecialidade" placeholder="Especialidade">
<input id="vetEndereco" placeholder="Endereço">
<input id="vetTelefone" placeholder="Telefone">
<button onclick="cadastrarVet()">Cadastrar</button>

<h2>Veterinários</h2>
<div id="vets"></div>

<h2>Agendar Consulta</h2>
<select id="petSelect"></select>
<select id="vetSelect"></select>
<input id="appointmentData" type="datetime-local" placeholder="Data">
<input id="appointmentMotivo" placeholder="Motivo">
<button onclick="agendarConsulta()">Agendar</button>

<h2>Agendamentos</h2>
<div id="appointments"></div>

<h2>Validar Endereço por CEP</h2>
<input id="cep" placeholder="CEP">
<button onclick="buscarEndereco()">Buscar</button>
<div id="endereco"></div>

<script src="script.js"></script>
</body>
</html>
