services:
  api-principal:
    build:
      context: .
    environment:
      SECONDARY_API_URL: http://api-secundaria:8001
    ports:
      - "8000:8000"
    depends_on:
      - api-secundaria

  api-secundaria:
    build:
      context: ../api-secundaria
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ../frontend
    ports:
      - "8080:80"
    depends_on:
      - api-principal