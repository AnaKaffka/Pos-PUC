version: "3"

services:
  api-principal:
    build: ./api-principal
    environment:
      SECONDARY_API_URL: http://api-secundaria:8001
    ports:
      - "8000:8000"
    depends_on:
      - api-secundaria

  api-secundaria:
    build: ./api-secundaria
    ports:
      - "8001:8001"

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api-principal