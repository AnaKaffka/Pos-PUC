<svg width="780" height="500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#475569"/>
    </marker>
    <marker id="ad" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="500" fill="#f1f5f9" rx="8"/>

  <!-- Title -->
  <text x="390" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Arquitetura — GeoDistance MVP</text>

  <!-- ===== Docker Compose boundary ===== -->
  <rect x="30" y="105" width="720" height="245" rx="10" fill="#eff6ff" stroke="#2496ed" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="30" y="92" width="148" height="22" rx="4" fill="#2496ed"/>
  <text x="38" y="107" font-size="11" font-weight="bold" fill="#fff">&#x1F433; Docker Compose</text>

  <!-- ===== BROWSER (outside Docker) ===== -->
  <rect x="54" y="36" width="132" height="56" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
  <text x="120" y="60" text-anchor="middle" font-size="17">&#x1F5A5;&#xFE0F;</text>
  <text x="120" y="80" text-anchor="middle" font-size="11" fill="#1e293b">Navegador</text>

  <!-- Browser → Frontend arrow -->
  <line x1="120" y1="92" x2="120" y2="122" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="134" y="110" font-size="9" fill="#64748b">HTTP</text>

  <!-- ===== FRONTEND ===== -->
  <rect x="54" y="122" width="132" height="68" rx="8" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="120" y="148" text-anchor="middle" font-size="17">&#x1F310;</text>
  <text x="120" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c4a6e">Frontend</text>
  <text x="120" y="179" text-anchor="middle" font-size="9" fill="#0369a1">nginx  ·  :8080</text>

  <!-- Frontend → API Principal arrow -->
  <line x1="186" y1="156" x2="250" y2="156" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="218" y="148" text-anchor="middle" font-size="9" fill="#475569">REST</text>
  <text x="218" y="168" text-anchor="middle" font-size="8" fill="#64748b">POST /distancia</text>

  <!-- ===== API PRINCIPAL ===== -->
  <rect x="250" y="122" width="160" height="68" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="330" y="148" text-anchor="middle" font-size="17">&#x2699;&#xFE0F;</text>
  <text x="330" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#4c1d95">API Principal</text>
  <text x="330" y="179" text-anchor="middle" font-size="9" fill="#6d28d9">FastAPI  ·  :8000</text>

  <!-- API Principal → API Secundária arrow -->
  <line x1="410" y1="156" x2="480" y2="156" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="445" y="148" text-anchor="middle" font-size="9" fill="#475569">REST</text>
  <text x="445" y="168" text-anchor="middle" font-size="8" fill="#64748b">POST /calcular</text>

  <!-- ===== API SECUNDÁRIA ===== -->
  <rect x="480" y="122" width="165" height="68" rx="8" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="562" y="148" text-anchor="middle" font-size="17">&#x1F4D0;</text>
  <text x="562" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#064e3b">API Secundária</text>
  <text x="562" y="179" text-anchor="middle" font-size="9" fill="#047857">FastAPI  ·  :8001</text>

  <!-- ===== SQLITE (inside Docker, below API Principal) ===== -->
  <!-- Arrow: API Principal → SQLite -->
  <line x1="330" y1="190" x2="330" y2="252" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>
  <!-- Cylinder -->
  <rect x="270" y="266" width="120" height="50" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <ellipse cx="330" cy="266" rx="60" ry="13" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.5"/>
  <ellipse cx="330" cy="316" rx="60" ry="13" fill="#fde68a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="330" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#78350f">SQLite</text>
  <text x="330" y="304" text-anchor="middle" font-size="9" fill="#92400e">db.sqlite</text>

  <!-- ===== EXTERNAL APIS boundary ===== -->
  <rect x="30" y="378" width="720" height="82" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="390" y="373" text-anchor="middle" font-size="10" fill="#64748b">APIs Externas</text>

  <!-- ViaCEP box -->
  <rect x="120" y="392" width="150" height="52" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="195" y="414" text-anchor="middle" font-size="14">&#x1F517;</text>
  <text x="195" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">ViaCEP</text>
  <text x="195" y="444" text-anchor="middle" font-size="9" fill="#64748b">viacep.com.br</text>

  <!-- Nominatim box -->
  <rect x="500" y="392" width="180" height="52" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="590" y="414" text-anchor="middle" font-size="14">&#x1F5FA;&#xFE0F;</text>
  <text x="590" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">Nominatim / OSM</text>
  <text x="590" y="444" text-anchor="middle" font-size="9" fill="#64748b">openstreetmap.org</text>

  <!-- Arrow: API Principal → ViaCEP (dashed, exits Docker) -->
  <line x1="295" y1="190" x2="205" y2="392" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>

  <!-- Arrow: API Secundária → ViaCEP (dashed, exits Docker) -->
  <line x1="500" y1="190" x2="265" y2="392" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>

  <!-- Arrow: API Secundária → Nominatim (dashed, exits Docker) -->
  <line x1="590" y1="190" x2="590" y2="392" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>

  <!-- ===== LEGEND ===== -->
  <line x1="44" y1="472" x2="74" y2="472" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="79" y="476" font-size="9" fill="#475569">Comunicação interna (REST / HTTP)</text>
  <line x1="290" y1="472" x2="320" y2="472" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>
  <text x="325" y="476" font-size="9" fill="#64748b">Chamada a API externa (HTTP)</text>
</svg>
